name: Pilipala Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: "stable"
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -di > android/app/vvex.jks

      - name: Build APKs (split-per-abi)
        run: flutter build apk --release --split-per-abi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >>"$GITHUB_OUTPUT"

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-armeabi-v7a-release.apk app-arm64-v8a-release.apk app-x86_64-release.apk; do
            if [ -f "$f" ]; then
              suffix=$(echo "$f" | sed 's/app-\(.*\)-release\.apk/\1/')
              mv "$f" "Pili-${suffix}-${{ steps.version.outputs.version }}.apk"
            fi
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: Pilipala-Release-Android
          path: build/app/outputs/flutter-apk/Pili-*.apk
          if-no-files-found: error

  iOS:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: "stable"
          cache: true

      - name: Build iOS (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r9 app.ipa Payload/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >>"$GITHUB_OUTPUT"

      - name: Rename IPA
        run: |
          mkdir -p build
          mv app.ipa "build/Pili-${{ steps.version.outputs.version }}.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pilipala-Release-iOS
          path: build/Pili-*.ipa
          if-no-files-found: error

  upload:
    runs-on: ubuntu-latest
    needs: [android, iOS]

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Pilipala-Release-*
          path: ./Pilipala-Release
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >>"$GITHUB_OUTPUT"

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          name: v${{ steps.version.outputs.version }}
          token: ${{ secrets.GIT_TOKEN }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          allowUpdates: true
          artifacts: Pilipala-Release/*
